<style>
/* ══════════════════════════════════════════════════════════════════════════
   FullCalendar — override global (style tag → goes global in Angular)
   ══════════════════════════════════════════════════════════════════════════ */

/* CSS variables */
.cal-wrapper {
  --fc-border-color: #e2e8f0;
  --fc-today-bg-color: rgba(37, 99, 235, 0.07);
  --fc-neutral-bg-color: #f8fafc;
  --fc-page-bg-color: transparent;
  --fc-event-bg-color: transparent;
  --fc-event-border-color: transparent;
  --fc-non-business-color: rgba(0,0,0,.03);
}
.cal-wrapper.dark-cal {
  --fc-border-color: #334155;
  --fc-today-bg-color: rgba(37, 99, 235, 0.13);
  --fc-neutral-bg-color: #0f172a;
  --fc-page-bg-color: transparent;
  --fc-non-business-color: rgba(255,255,255,.03);
}

/* Toolbar */
.cal-wrapper .fc-toolbar.fc-header-toolbar {
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.cal-wrapper .fc-toolbar-title {
  font-size: 1.1rem !important;
  font-weight: 700 !important;
  color: #1e293b;
}
.dark-cal .fc-toolbar-title { color: #e2e8f0 !important; }

/* Toolbar buttons — Material-style */
.cal-wrapper .fc-button {
  background: #fff !important;
  border: 1px solid #e2e8f0 !important;
  color: #334155 !important;
  border-radius: 8px !important;
  font-size: .82rem !important;
  font-weight: 600 !important;
  padding: 5px 12px !important;
  box-shadow: none !important;
  transition: background .15s, border-color .15s !important;
  text-transform: none !important;
}
.cal-wrapper .fc-button:hover {
  background: #f1f5f9 !important;
  border-color: #cbd5e1 !important;
}
.cal-wrapper .fc-button-active,
.cal-wrapper .fc-button-primary:not(:disabled).fc-button-active {
  background: #2563eb !important;
  border-color: #2563eb !important;
  color: #fff !important;
}
.dark-cal .fc-button {
  background: #1e293b !important;
  border-color: #334155 !important;
  color: #e2e8f0 !important;
}
.dark-cal .fc-button:hover {
  background: #334155 !important;
}

/* Prev/next group */
.cal-wrapper .fc-button-group .fc-button {
  border-radius: 0 !important;
}
.cal-wrapper .fc-button-group .fc-button:first-child { border-radius: 8px 0 0 8px !important; }
.cal-wrapper .fc-button-group .fc-button:last-child  { border-radius: 0 8px 8px 0 !important; }

/* Column headers (Mon, Tue…) */
.cal-wrapper .fc-col-header-cell {
  padding: 8px 0 !important;
  background: #f8fafc !important;
}
.dark-cal .fc-col-header-cell { background: #0f172a !important; }

.cal-wrapper .fc-col-header-cell-cushion {
  font-size: .78rem !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: .6px !important;
  color: #64748b !important;
  text-decoration: none !important;
}
.dark-cal .fc-col-header-cell-cushion { color: #94a3b8 !important; }

/* Day number */
.cal-wrapper .fc-daygrid-day-number {
  font-size: .82rem !important;
  font-weight: 600 !important;
  color: #475569 !important;
  text-decoration: none !important;
  padding: 6px 8px !important;
}
.dark-cal .fc-daygrid-day-number { color: #94a3b8 !important; }

/* Today */
.cal-wrapper .fc-day-today .fc-daygrid-day-number {
  background: #2563eb !important;
  color: #fff !important;
  border-radius: 50% !important;
  width: 26px; height: 26px;
  display: flex !important; align-items: center !important; justify-content: center !important;
  margin: 4px !important;
  padding: 0 !important;
}

/* Weekend subtle tint */
.cal-wrapper .fc-day-sat,
.cal-wrapper .fc-day-sun {
  background: rgba(0,0,0,.018) !important;
}
.dark-cal .fc-day-sat,
.dark-cal .fc-day-sun {
  background: rgba(255,255,255,.025) !important;
}

/* Time slots (week/day view) */
.cal-wrapper .fc-timegrid-slot { height: 36px !important; }
.cal-wrapper .fc-timegrid-slot-label-cushion {
  font-size: .75rem !important;
  color: #94a3b8 !important;
}

/* Now indicator */
.cal-wrapper .fc-timegrid-now-indicator-line {
  border-color: #ef4444 !important;
  border-width: 2px !important;
}
.cal-wrapper .fc-timegrid-now-indicator-arrow {
  border-top-color: #ef4444 !important;
  border-bottom-color: #ef4444 !important;
}

/* Remove outline on events */
.cal-wrapper .fc-event { outline: none !important; border: none !important; background: transparent !important; }
.cal-wrapper .fc-daygrid-event { margin: 1px 2px !important; border-radius: 6px !important; overflow: hidden !important; }
.cal-wrapper .fc-timegrid-event { border-radius: 0 6px 6px 0 !important; overflow: hidden !important; }
.cal-wrapper .fc-event:focus { box-shadow: none !important; }

/* More link */
.cal-wrapper .fc-daygrid-more-link {
  font-size: .75rem !important;
  font-weight: 700 !important;
  color: #2563eb !important;
}

/* Scrollbar în week/day view */
.cal-wrapper .fc-scroller::-webkit-scrollbar { width: 5px; }
.cal-wrapper .fc-scroller::-webkit-scrollbar-track { background: transparent; }
.cal-wrapper .fc-scroller::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.dark-cal .fc-scroller::-webkit-scrollbar-thumb { background: #334155; }

/* ── Custom event pill ──────────────────────────────────────────────────── */
.fc-pill {
  padding: 2px 6px 2px 7px;
  border-left: 3px solid transparent;
  border-radius: 0 5px 5px 0;
  overflow: hidden;
  cursor: pointer;
  height: 100%;
  box-sizing: border-box;
  transition: filter .12s;
}
.fc-pill:hover { filter: brightness(.93); }
.fc-pill-time {
  font-size: 10px;
  font-weight: 700;
  line-height: 1.4;
}
.fc-pill-name {
  font-size: 11px;
  color: #334155;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dark-cal .fc-pill-name { color: #94a3b8; }
.dark-cal .fc-pill { filter: brightness(.9); }
</style>

<div class="row">
  <div class="col-12">
    <mat-card class="cardWithShadow">

      <!-- ── Header ──────────────────────────────────────────────────────── -->
      <mat-card-header style="padding: 20px 24px 0; flex-direction: column; align-items: stretch;">
        <div class="d-flex align-items-center gap-12 m-b-16" style="flex-wrap:wrap;">
          <div class="d-flex align-items-center gap-8">
            <i-tabler name="calendar" style="color:#2563eb; width:24px; height:24px;"></i-tabler>
            <mat-card-title style="margin:0; font-size:1.1rem; font-weight:700;">
              Calendar Programări
            </mat-card-title>
          </div>

          <span style="flex:1;"></span>

          <!-- Filter doctor (admin) -->
          <mat-form-field appearance="outline" style="width:220px; margin:0;" subscriptSizing="dynamic"
                          *ngIf="isAdmin">
            <mat-label>Doctor</mat-label>
            <mat-select (selectionChange)="filterByDoctor($event.value)" value="all">
              <mat-option value="all">Toți doctorii</mat-option>
              <mat-option *ngFor="let d of doctors" [value]="d.user_id">
                {{ (d.first_name || d.last_name) ? d.first_name + ' ' + d.last_name : d.email }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <!-- Stats bar ──────────────────────────────────────────────────── -->
        <div class="d-flex gap-12 m-b-20" style="flex-wrap:wrap;">

          <div style="display:flex; align-items:center; gap:8px; padding:8px 14px;
                      background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0;">
            <i-tabler name="calendar-event" style="width:18px;height:18px;color:#64748b;"></i-tabler>
            <span style="font-size:.82rem; color:#64748b; font-weight:600;">Total</span>
            <span style="font-size:.95rem; font-weight:800; color:#1e293b;">{{ totalCount }}</span>
          </div>

          <div style="display:flex; align-items:center; gap:8px; padding:8px 14px;
                      background:#fffbeb; border-radius:10px; border:1px solid #fde68a;">
            <div style="width:10px;height:10px;border-radius:50%;background:#f59e0b;flex-shrink:0;"></div>
            <span style="font-size:.82rem; color:#92400e; font-weight:600;">În așteptare</span>
            <span style="font-size:.95rem; font-weight:800; color:#92400e;">{{ pendingCount }}</span>
          </div>

          <div style="display:flex; align-items:center; gap:8px; padding:8px 14px;
                      background:#eff6ff; border-radius:10px; border:1px solid #bfdbfe;">
            <div style="width:10px;height:10px;border-radius:50%;background:#2563eb;flex-shrink:0;"></div>
            <span style="font-size:.82rem; color:#1e40af; font-weight:600;">Confirmate</span>
            <span style="font-size:.95rem; font-weight:800; color:#1e40af;">{{ confirmedCount }}</span>
          </div>

          <div style="display:flex; align-items:center; gap:8px; padding:8px 14px;
                      background:#f0fdf4; border-radius:10px; border:1px solid #bbf7d0;">
            <div style="width:10px;height:10px;border-radius:50%;background:#16a34a;flex-shrink:0;"></div>
            <span style="font-size:.82rem; color:#14532d; font-weight:600;">Finalizate</span>
            <span style="font-size:.95rem; font-weight:800; color:#14532d;">{{ completedCount }}</span>
          </div>

          <div style="display:flex; align-items:center; gap:8px; padding:8px 14px;
                      background:#fef2f2; border-radius:10px; border:1px solid #fecaca;">
            <div style="width:10px;height:10px;border-radius:50%;background:#dc2626;flex-shrink:0;"></div>
            <span style="font-size:.82rem; color:#991b1b; font-weight:600;">Anulate</span>
            <span style="font-size:.95rem; font-weight:800; color:#991b1b;">{{ cancelledCount }}</span>
          </div>

        </div>
      </mat-card-header>

      <!-- ── Calendar ────────────────────────────────────────────────────── -->
      <mat-card-content style="padding: 0 16px 24px;">

        <!-- Loading skeleton -->
        <div *ngIf="loading" style="display:grid; grid-template-rows: 40px 1fr; gap:12px; padding:8px 0;">
          <div style="height:40px; border-radius:8px; background:#f1f5f9; animation: shimmer 1.5s infinite;"></div>
          <div style="height:520px; border-radius:8px; background:#f8fafc; animation: shimmer 1.5s infinite;"></div>
        </div>

        <div class="cal-wrapper" [class.dark-cal]="isDark" *ngIf="!loading">
          <full-calendar #calendar [options]="calendarOptions"></full-calendar>
        </div>

      </mat-card-content>
    </mat-card>
  </div>
</div>
